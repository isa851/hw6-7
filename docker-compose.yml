services:
  web:
    build: .
    container_name: drf_web
    command: sh -c "python manage.py migrate && daphne -b 0.0.0.0 -p 8000 core.asgi:application"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CHANNEL_LAYER_REDIS_URL=redis://redis:6379/2
    volumes:
      - .:/app
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: drf_redis

  celery_worker:
    build: .
    container_name: drf_celery_worker
    command: celery -A core worker -l info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
      - web

  celery_beat:
    build: .
    container_name: drf_celery_beat
    command: celery -A core beat -l info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
      - web
